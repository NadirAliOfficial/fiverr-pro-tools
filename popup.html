<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fiverr Pro Tools</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <span class="logo">⚡</span>
    <div class="header-text">
      <span class="title">Fiverr Pro Tools</span>
      <span class="tab-label" id="tab-label">Loading...</span>
    </div>
  </div>

  <div class="section">
    <div class="toggle-row">
      <div class="info">
        <div class="label">Online Status Keeper <span id="keeper-dot" class="dot"></span></div>
        <div class="sub" id="keeper-sub">Keeps your green dot active</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggle-keeper" />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="footer">Only active on fiverr.com</div>
  <script src="popup.js"></script>
</body>
</html>
